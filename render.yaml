services:
  - type: cron
    name: carsensor-scraper
    env: python
    schedule: "0 9 * * *"  # 毎日9時(UTC)に実行
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: python scraper.py
    repo: https://github.com/yourusername/carsensor-scraper  # 実際のリポジトリURLに変更
    branch: main
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
