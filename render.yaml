# ======================================
# Render.com クラウド自動実行設定
# ======================================
# このファイルはオプションです。
# ローカル実行の場合は不要です。
# Renderで自動実行したい場合のみ使用してください。
# ======================================

services:
  - type: cron
    name: carsensor-scraper
    env: python
    schedule: "0 9 * * *"  # 毎日9時(UTC)に実行 = 日本時間18時
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: python scraper.py
    repo: https://github.com/ZONETECH-team/carsenser-scraper.git
    branch: main
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
      - key: AUTO_GIT_PUSH
        value: true  # Render実行時は自動プッシュを有効化
      - key: GITHUB_TOKEN
        sync: false  # Renderダッシュボードで手動設定
      - key: GITHUB_USER_NAME
        value: Carsensor Scraper Bot
      - key: GITHUB_USER_EMAIL
        value: bot@carsensor-scraper.render.com
